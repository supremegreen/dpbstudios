<!DOCTYPE html>
<html>
  <head>

    <!-- NEW -->
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- 🔥 CACHE KILL -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, max-age=0"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Preview</title>

    <style>
      body {
        margin: 0;
        background: black;
        font-family: Arial;
        overflow: hidden;
        color: white;
      }

      #filtersScreen,
      #finalScreen {
        position: absolute;
        width: 100vw;
        height: 100vh;
      }

      #finalScreen {
        display: none;
      }

      #filterPreview,
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* NEW */
      #swipeHint {
        position: absolute;
        top: 52%;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 14px;
        color: white;
        font-size: clamp(16px, 3vw, 22px);
        font-weight: 400;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.7);
        z-index: 100;
        pointer-events: none;
      }

      #swipeHint .arrow {
        font-size: clamp(20px, 4vw, 28px);
        font-weight: 300;
      }

      #applyFilter {
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 14px 26px;
        border-radius: 14px;
        border: none;
        background: #00c853;
        color: white;
      }

      #downloadBtn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        background: white;
        border-radius: 10px;
        border: none;
        display: none;
      }

      #overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>

  <body>
    <div id="filtersScreen">

      <!-- UPDATED -->
      <div id="swipeHint">
        <span class="arrow">&larr;</span>
        <span>Swipe to Choose Filter</span>
        <span class="arrow">&rarr;</span>
      </div>

      <img id="filterPreview" />
      <button id="applyFilter">Next</button>
    </div>

    <div id="finalScreen">
      <canvas id="canvas"></canvas>
      <div id="overlay"></div>
      <button id="downloadBtn">Download To Live Wall</button>
    </div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js'

      import {
        getStorage,
        ref,
        uploadBytes
      } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js'

      const app = initializeApp({
        apiKey: 'AIzaSyDUW4ZhyXFIqYtB7q-l-Ej_Pb_5tb2WZlw',
        authDomain: 'digital-photo-booth.firebaseapp.com',
        projectId: 'digital-photo-booth',
        storageBucket: 'digital-photo-booth.firebasestorage.app',
        messagingSenderId: '1058486104842',
        appId: '1:1058486104842:web:601e48e0b9ccc71d9c40f3'
      })

      const storage = getStorage(app)

      const baseImage = new Image()

      let ready = false
            const saved = localStorage.getItem('photo')

      if (saved && saved.startsWith('data:image')) {
        baseImage.src = saved

        baseImage.onload = () => (ready = true)
      }

      const filters = ['./images/ma2.png','./images/mahbday1.png','./images/transparent.png']

      let index = 0

      const preview = document.getElementById('filterPreview')

      const applyBtn = document.getElementById('applyFilter')

      const downloadBtn = document.getElementById('downloadBtn')

      const canvas = document.getElementById('canvas')

      const ctx = canvas.getContext('2d')

      function draw() {
        preview.src = filters[index]
      }

      window.onload = draw

      let startX = 0

      preview.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX
      })

      preview.addEventListener('touchend', e => {
        const endX = e.changedTouches[0].clientX

        const diff = startX - endX

        if (diff > 50) {
          index++

          if (index >= filters.length) {
            index = 0
          }

          draw()
        }

        if (diff < -50) {
          index--

          if (index < 0) {
            index = filters.length - 1
          }

          draw()
        }
      })

      applyBtn.onclick = () => {
        if (!ready) return

        filtersScreen.style.display = 'none'

        finalScreen.style.display = 'block'

        const filterImg = new Image()

        filterImg.src = filters[index]

        filterImg.onload = () => {
          canvas.width = 1080

          canvas.height = 1920

          ctx.drawImage(baseImage, 0, 0, 1080, 1920)

          ctx.drawImage(filterImg, 0, 0, 1080, 1920)

          downloadBtn.style.display = 'block'
        }
      }
            downloadBtn.onclick = async () => {
        try {
          const blob = await new Promise(resolve =>
            canvas.toBlob(resolve, 'image/png')
          )

          const fileName = `photo_${Date.now()}.png`

          const storageRef = ref(
            storage,
            `maconartscenter/livewall/${fileName}`
          )

          await uploadBytes(storageRef, blob)

          /* 🔥 MOBILE SAFE SAVE */
          const imageURL = canvas.toDataURL('image/png')

          const link = document.createElement('a')

          link.href = imageURL
          link.download = fileName

          document.body.appendChild(link)

          link.click()

          document.body.removeChild(link)

          /* 🔥 SLIGHT DELAY FOR MOBILE SAVE */
          setTimeout(() => {
            location.replace('index.html')
          }, 4000)
        } catch (error) {
          console.error('Upload failed:', error)

          alert('Upload failed. Check Firebase rules.')
        }
      }
    </script>
  </body>
</html>
