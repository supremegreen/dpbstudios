<!DOCTYPE html>
<html>
  <head>
    <!-- 🔥 UTF-8 FIX -->
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- 🔥 CACHE FIX -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate, max-age=0"
    />

    <meta http-equiv="Pragma" content="no-cache" />

    <meta http-equiv="Expires" content="0" />

    <title>Success</title>

    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        width: 100vw;
        height: 100vh;

        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* MAIN CONTAINER */
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* SUCCESS TEXT */
      .successText {
        color: white;
        font-size: 34px;
        font-weight: bold;
        margin-bottom: 35px;
        text-align: center;

        animation: fadeGlow 2s infinite alternate;
      }

      @keyframes fadeGlow {
        from {
          opacity: 0.7;
        }

        to {
          opacity: 1;
        }
      }

      /* START BUTTON */
      #startBtn {
        background: none;
        border: none;
        cursor: pointer;

        transition: transform 0.1s ease, filter 0.1s ease;

        animation: glowPulse 2s infinite;

        outline: none;

        -webkit-tap-highlight-color: transparent;

        padding: 0;
      }

      /* 🔥 BUTTON SIZE ADJUST HERE */
      #startBtn img {
        width: 190px;
        max-width: 70vw;

        display: block;

        pointer-events: none;
        user-select: none;
      }

      /* REAL BUTTON PRESS */
      #startBtn:active {
        transform: scale(0.9) translateY(4px);

        filter: brightness(0.8);

        animation: none;
      }

      /* PULSE ANIMATION */
      @keyframes glowPulse {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.04);
        }

        100% {
          transform: scale(1);
        }
      }

      /* RELEASE BOUNCE */
      #startBtn.released {
        animation: bounce 0.18s ease;
      }

      @keyframes bounce {
        0% {
          transform: scale(0.9);
        }

        50% {
          transform: scale(1.06);
        }

        100% {
          transform: scale(1);
        }
      }

      /* LOADING TEXT */
      #loadingText {
        color: #aaa;
        margin-top: 20px;
        font-size: 16px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- SUCCESS MESSAGE -->
      <div class="successText">Payment Successful</div>

      <!-- START BUTTON -->
      <button id="startBtn">
        <img src="images/start.png" alt="Start" />
      </button>

      <!-- LOADING -->
      <div id="loadingText">Opening Camera...</div>
    </div>

    <script>
      const startBtn = document.getElementById('startBtn')
      const loadingText = document.getElementById('loadingText')

      /*
        BOUNCE RELEASE EFFECT
      */
      startBtn.addEventListener('touchend', () => {
        startBtn.classList.remove('released')

        void startBtn.offsetWidth

        startBtn.classList.add('released')
      })

      startBtn.addEventListener('mouseup', () => {
        startBtn.classList.remove('released')

        void startBtn.offsetWidth

        startBtn.classList.add('released')
      })

      /*
        BUTTON CLICK
      */
      startBtn.addEventListener('click', () => {
        /*
          PREVENT DOUBLE TAPS
        */
        startBtn.style.pointerEvents = 'none'

        /*
          SHOW LOADING
        */
        loadingText.style.display = 'block'

        /*
          SMALL DELAY FOR SMOOTH UX
        */
        setTimeout(() => {
          /*
            HARD REDIRECT TO CAMERA
            FIXES SAFARI/STRIPE CACHE ISSUES
          */
          window.location.replace('camera.html')
        }, 350)
      })
    </script>
  </body>
</html>
