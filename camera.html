<!DOCTYPE html>
<html>
  <head>
    <!-- 🔥 FIX UTF-8 ENCODING -->
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <title>Camera</title>

    <style>
      body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      video,
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #captureBtn {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 85px;
        height: 85px;
        border-radius: 50%;
        background: red;
        border: 5px solid #bbb;
        z-index: 10;
      }

      #flipBtn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 55px;
        height: 55px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        user-select: none;
      }

      .previewBtn {
        position: absolute;
        top: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.6);
        z-index: 10;
      }

      #retake {
        left: 20px;
      }

      #approve {
        right: 20px;
      }

      /* 🔥 SVG ICON SIZE */
      .iconSvg {
        width: 32px;
        height: 32px;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline></video>

    <canvas id="previewCanvas" style="display: none"></canvas>

    <button id="captureBtn"></button>

    <!-- 🔄 BLUE FLIP CAMERA SVG -->
    <div id="flipBtn">
      <svg
        class="iconSvg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#1E90FF"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M21 2v6h-6"></path>
        <path d="M3 12a9 9 0 0 1 15.5-6.36L21 8"></path>
        <path d="M3 22v-6h6"></path>
        <path d="M21 12a9 9 0 0 1-15.5 6.36L3 16"></path>
      </svg>
    </div>

    <!-- ❌ RED RETAKE SVG -->
    <div id="retake" class="previewBtn" style="display: none">
      <svg
        class="iconSvg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#FF2D2D"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>

    <!-- ✅ MONEY GREEN APPROVE SVG -->
    <div id="approve" class="previewBtn" style="display: none">
      <svg
        class="iconSvg"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#00C853"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <script>
      let stream
      let currentFacingMode = 'environment'
      let photoBlob

      const video = document.getElementById('video')
      const canvas = document.getElementById('previewCanvas')
      const ctx = canvas.getContext('2d')

      const captureBtn = document.getElementById('captureBtn')
      const flipBtn = document.getElementById('flipBtn')
      const retakeBtn = document.getElementById('retake')
      const approveBtn = document.getElementById('approve')

      /* START CAMERA */
      async function startCamera() {
        if (stream) {
          stream.getTracks().forEach(track => track.stop())
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacingMode },

            /* 🔥 QUALITY BOOST */
            width: { ideal: 1920 },
            height: { ideal: 1080 },

            /* 🔥 BETTER CAMERA SELECTION */
            aspectRatio: { ideal: 16 / 9 },

            /* 🔥 ADVANCED SETTINGS */
            focusMode: 'continuous',
            exposureMode: 'continuous',
            whiteBalanceMode: 'continuous'
          }
        })

        video.srcObject = stream

        if (currentFacingMode === 'user') {
          video.style.transform = 'scaleX(-1)'
        } else {
          video.style.transform = 'scaleX(1)'
        }
      }

      window.onload = startCamera

      /* FLIP CAMERA */
      flipBtn.onclick = () => {
        currentFacingMode =
          currentFacingMode === 'user' ? 'environment' : 'user'

        startCamera()
      }

      /* CAPTURE PHOTO */
      captureBtn.onclick = () => {
        canvas.width = video.videoWidth
        canvas.height = video.videoHeight

        if (currentFacingMode === 'user') {
          ctx.translate(canvas.width, 0)
          ctx.scale(-1, 1)
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height)

        ctx.setTransform(1, 0, 0, 1, 0, 0)

        canvas.toBlob(
          blob => {
            photoBlob = blob

            video.style.display = 'none'
            canvas.style.display = 'block'

            captureBtn.style.display = 'none'
            flipBtn.style.display = 'none'

            retakeBtn.style.display = 'flex'
            approveBtn.style.display = 'flex'
          },
          'image/jpeg',
          1.0
        )
      }

      /* RETAKE */
      retakeBtn.onclick = () => {
        video.style.display = 'block'
        canvas.style.display = 'none'

        captureBtn.style.display = 'block'
        flipBtn.style.display = 'flex'

        retakeBtn.style.display = 'none'
        approveBtn.style.display = 'none'
      }

      /* APPROVE */
      approveBtn.onclick = () => {
        const reader = new FileReader()

        reader.onloadend = () => {
          localStorage.setItem('photo', reader.result)

          window.location.href = 'editor.html'
        }

        reader.readAsDataURL(photoBlob)
      }
    </script>
  </body>
</html>
