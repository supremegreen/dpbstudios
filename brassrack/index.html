<!DOCTYPE html>
<html>
  <head>
    <script src="config.js"></script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <title>Photo Booth Homepage</title>

    <style>
      body {
        margin: 0;
        background: black;
        font-family: Arial;
        overflow: hidden;
        height: 100vh;
        color: white;
      }

      .screen {
        position: absolute;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      #logo {
        width: 0px;
        margin-bottom: 25px;
      }

      #logo2 {
        width: 380px;
        margin-bottom: -95px;
      }

      #takePhoto {
        background: none;
        border: none;
        cursor: pointer;
        transition: transform 0.1s ease, filter 0.1s ease;
        animation: glowPulse 2s infinite;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      #takePhoto img {
        width: 280px;
        margin-top: 200px;
        pointer-events: none;
      }

      #takePhoto:active {
        transform: scale(0.9) translateY(4px);
        filter: brightness(0.8);
        animation: none;
      }

      @keyframes glowPulse {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.04);
        }

        100% {
          transform: scale(1);
        }
      }

      #takePhoto.released {
        animation: bounce 0.18s ease;
      }

      @keyframes bounce {
        0% {
          transform: scale(0.9);
        }

        50% {
          transform: scale(1.06);
        }

        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>

  <body>
    <div class="screen">
      <img id="logo2" src="images/dpblogo.png" />

      <button id="takePhoto">
        <img src="images/takephoto.png" />
      </button>
    </div>

    <script>
      const btn = document.getElementById('takePhoto')

      btn.addEventListener('touchend', () => {
        btn.classList.add('released')

        setTimeout(() => {
          btn.classList.remove('released')
        }, 180)
      })

      btn.addEventListener('mouseup', () => {
        btn.classList.add('released')

        setTimeout(() => {
          btn.classList.remove('released')
        }, 180)
      })

      btn.addEventListener('click', () => {
        // Redirect to Stripe Payment Link
        window.location.href = PAYMENT_LINK
      })
    </script>
  </body>
</html>
